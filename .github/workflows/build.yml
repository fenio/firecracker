name: Build kernel and rootfs

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'kernel-configs/**'
      - 'rootfs-configs/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Linux kernel version'
        required: false
        default: '6.12.76'
        type: string

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build kernel (${{ matrix.profile }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      matrix:
        profile: [minimal, base, tns-csi]
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential bc flex bison libelf-dev libssl-dev wget cpio

      - name: Cache kernel source
        uses: actions/cache@v4
        with:
          path: working/linux-*.tar.xz
          key: kernel-source-${{ inputs.kernel_version || '6.12.76' }}

      - name: Build kernel
        run: |
          KERNEL_PROFILE="${{ matrix.profile }}" \
          KERNEL_VERSION="${{ inputs.kernel_version || '6.12.76' }}" \
            ./scripts/build-kernel.sh

      - name: Upload vmlinux
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-${{ matrix.profile }}
          path: dist/vmlinux-${{ matrix.profile }}
          retention-days: 30

  build-rootfs:
    name: Build rootfs (${{ matrix.profile }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        profile: [base, tns-csi]
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap e2fsprogs

      - name: Build rootfs
        run: |
          sudo ROOTFS_PROFILE="${{ matrix.profile }}" \
            ./scripts/build-rootfs.sh

      - name: Compress rootfs
        run: |
          sudo zstd -T0 -10 dist/rootfs-${{ matrix.profile }}.ext4 -o dist/rootfs-${{ matrix.profile }}.ext4.zst
          sudo chown -R $(id -u):$(id -g) dist/
          ls -lh dist/

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.profile }}
          path: |
            dist/rootfs-${{ matrix.profile }}.ext4.zst
            dist/id_rsa
            dist/id_rsa.pub
          retention-days: 30

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-kernel, build-rootfs]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all kernel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vmlinux-*
          path: dist/
          merge-multiple: true

      - name: Download all rootfs artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rootfs-*
          path: dist/
          merge-multiple: true

      - name: Download Firecracker
        run: |
          FC_VERSION="v1.15.0"
          ARCH="$(uname -m)"
          curl -fSL -o /tmp/firecracker.tgz \
            "https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VERSION}/firecracker-${FC_VERSION}-${ARCH}.tgz"
          tar -xzf /tmp/firecracker.tgz -C /tmp
          cp "/tmp/release-${FC_VERSION}-${ARCH}/firecracker-${FC_VERSION}-${ARCH}" dist/firecracker
          chmod +x dist/firecracker

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vmlinux-minimal
            dist/vmlinux-base
            dist/vmlinux-tns-csi
            dist/rootfs-base.ext4.zst
            dist/rootfs-tns-csi.ext4.zst
            dist/id_rsa
            dist/id_rsa.pub
            dist/firecracker
          generate_release_notes: true
